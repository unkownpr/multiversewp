name: MultiverseWP
options:
  bundleIdPrefix: com.semihsilistre.multiversewp
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: YES
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    CLANG_WARN_QUOTED_INCLUDE_IN_FRAMEWORK_HEADER: YES
    GCC_TREAT_WARNINGS_AS_ERRORS: NO
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.0.0"
  SwiftProtobuf:
    url: https://github.com/apple/swift-protobuf
    from: "1.28.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

targets:
  MultiverseWP:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources
    resources:
      - path: Resources
    dependencies:
      - package: GRDB
        product: GRDB
      - package: SwiftProtobuf
        product: SwiftProtobuf
      - package: Sparkle
        product: Sparkle
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: MultiverseWP
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        # Asset-catalog icon. Without these keys the Assets.car compile step
        # is skipped and the Dock falls back to the gray placeholder icon.
        CFBundleIconFile: AppIcon
        CFBundleIconName: AppIcon
        LSApplicationCategoryType: public.app-category.social-networking
        NSHumanReadableCopyright: "© 2026 Semih Silistre · ssilistre.dev"
        NSPrincipalClass: NSApplication
        # Sparkle 2.x auto-update keys
        # Feed lives on the gh-pages branch of the multiversewp repo.
        SUFeedURL: https://unkownpr.github.io/multiversewp/appcast.xml
        # Required when the host app is sandboxed; harmless when not. See
        # docs/auto-update.md for the sandbox / Sparkle interaction notes.
        SUEnableInstallerLauncherService: true
        # Public half of the EdDSA key pair. Generated once via
        # `bin/generate_keys` (see docs/sparkle-keys.md). The private half MUST
        # live in the Keychain only — never in this repo.
        SUPublicEDKey: MdsOnZRAM/xIA/YeRgSrCQGcs0iKN+fudr9P3e6T0ps=
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.semihsilistre.multiversewp
        PRODUCT_NAME: MultiverseWP
        MARKETING_VERSION: "0.1.15"
        CURRENT_PROJECT_VERSION: "15"
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_ENTITLEMENTS: Resources/MultiverseWP.entitlements
    preBuildScripts:
      - name: SwiftLint
        script: |
          if which swiftlint >/dev/null; then
            swiftlint --quiet
          else
            echo "warning: SwiftLint not installed"
          fi
        basedOnDependencyAnalysis: false
      - name: Build whatsmeow helper
        script: |
          set -euo pipefail
          GO_BIN=""
          for candidate in /opt/homebrew/bin/go /usr/local/bin/go "$(which go 2>/dev/null || true)"; do
            if [ -x "$candidate" ]; then
              GO_BIN="$candidate"
              break
            fi
          done
          if [ -z "$GO_BIN" ]; then
            echo "warning: Go toolchain not found; whatsmeow helper will not be rebuilt. Run scripts/bootstrap.sh."
            exit 0
          fi
          cd "$SRCROOT/WhatsmeowHelper"
          mkdir -p bin
          "$GO_BIN" build -o bin/whatsmeow-helper ./...
        basedOnDependencyAnalysis: false
        outputFiles:
          - $(SRCROOT)/WhatsmeowHelper/bin/whatsmeow-helper
    postBuildScripts:
      - name: Bundle app icon
        script: |
          set -euo pipefail
          SRC="$SRCROOT/Resources/AppIcon.icns"
          DST="$TARGET_BUILD_DIR/$PRODUCT_NAME.app/Contents/Resources/AppIcon.icns"
          if [ -f "$SRC" ]; then
            cp -f "$SRC" "$DST"
          else
            echo "warning: $SRC missing — run scripts/make-icon.sh"
          fi
        basedOnDependencyAnalysis: false
      - name: Bundle whatsmeow helper
        script: |
          set -euo pipefail
          SRC="$SRCROOT/WhatsmeowHelper/bin/whatsmeow-helper"
          DST="$TARGET_BUILD_DIR/$PRODUCT_NAME.app/Contents/Resources/whatsmeow-helper"
          if [ ! -f "$SRC" ]; then
            echo "warning: whatsmeow-helper binary missing — app will run without per-account connectivity"
            exit 0
          fi
          mkdir -p "$(dirname "$DST")"
          cp -f "$SRC" "$DST"
          chmod +x "$DST"
        basedOnDependencyAnalysis: false

  MultiverseWPTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Tests
    dependencies:
      - target: MultiverseWP
      - package: GRDB
        product: GRDB
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.semihsilistre.multiversewp.tests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/MultiverseWP.app/Contents/MacOS/MultiverseWP"

  MultiverseWPUITests:
    type: bundle.ui-testing
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: UITests
    dependencies:
      - target: MultiverseWP
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.semihsilistre.multiversewp.uitests
        TEST_TARGET_NAME: MultiverseWP
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        DEVELOPMENT_TEAM: WGWRFNDZXL

schemes:
  MultiverseWP:
    build:
      targets:
        MultiverseWP: all
        MultiverseWPTests: [test]
        MultiverseWPUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      coverageTargets:
        - MultiverseWP
      targets:
        - MultiverseWPTests
        - MultiverseWPUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
