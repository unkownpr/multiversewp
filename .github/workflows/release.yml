name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version label, e.g. 0.1.0"
        required: true
        default: "0.1.0"

jobs:
  build-dmg:
    runs-on: macos-15
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "value=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Install Homebrew tools
        run: brew install xcodegen swiftlint

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer || true

      - name: Build DMG
        env:
          MULTIVERSEWP_VERSION: ${{ steps.version.outputs.value }}
        run: ./scripts/release.sh

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: MultiverseWP-${{ steps.version.outputs.value }}.dmg
          path: release/MultiverseWP-${{ steps.version.outputs.value }}.dmg

      - name: Attach DMG to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/MultiverseWP-${{ steps.version.outputs.value }}.dmg
          generate_release_notes: true
