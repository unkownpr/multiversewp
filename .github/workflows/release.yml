name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version label, e.g. 0.1.0"
        required: true
        default: "0.1.0"

jobs:
  build-dmg:
    runs-on: macos-15
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "value=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Install Homebrew tools
        run: brew install xcodegen swiftlint

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer || true

      - name: Build DMG
        env:
          MULTIVERSEWP_VERSION: ${{ steps.version.outputs.value }}
        run: ./scripts/release.sh

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: MultiverseWP-${{ steps.version.outputs.value }}.dmg
          path: release/MultiverseWP-${{ steps.version.outputs.value }}.dmg

      - name: Upload appcast artifact
        uses: actions/upload-artifact@v4
        with:
          name: appcast-${{ steps.version.outputs.value }}.xml
          path: release/appcast.xml

      - name: Attach DMG to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/MultiverseWP-${{ steps.version.outputs.value }}.dmg
          generate_release_notes: true

      # Sparkle appcast — published to gh-pages so end users get auto-updates.
      # Only runs on tagged releases; manual workflow_dispatch builds stay
      # local-only so we don't accidentally push a half-baked appcast.
      - name: Stage appcast for gh-pages
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p gh-pages-staging
          cp release/appcast.xml gh-pages-staging/appcast.xml

      - name: Publish appcast to gh-pages branch
        if: startsWith(github.ref, 'refs/tags/v')
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages-staging
          publish_branch: gh-pages
          keep_files: true
          commit_message: "chore: appcast for v${{ steps.version.outputs.value }}"
