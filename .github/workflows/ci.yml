name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Install Homebrew tools
        run: |
          brew install xcodegen swiftlint
          xcodegen --version
          swiftlint --version

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer || true

      - name: Generate project
        run: xcodegen generate

      - name: Lint
        run: swiftlint --quiet

      - name: Build helper
        working-directory: WhatsmeowHelper
        run: |
          mkdir -p bin
          go build -o bin/whatsmeow-helper ./...

      - name: Build app
        run: |
          xcodebuild \
            -project MultiverseWP.xcodeproj \
            -scheme MultiverseWP \
            -configuration Debug \
            -destination 'platform=macOS,arch=arm64' \
            build CODE_SIGNING_ALLOWED=NO

      - name: Test
        env:
          WHATSMEOW_BIN: ${{ github.workspace }}/WhatsmeowHelper/bin/whatsmeow-helper
        run: |
          xcodebuild \
            -project MultiverseWP.xcodeproj \
            -scheme MultiverseWP \
            -configuration Debug \
            -destination 'platform=macOS,arch=arm64' \
            -enableCodeCoverage YES \
            test CODE_SIGNING_ALLOWED=NO
